name: Linux Check
on:
  workflow_dispatch: # Manual trigger
  push:
    paths: &paths
      - 3party/**
      - configure.sh
      - cmake/**
      - '!cmake/windows/**'
      - CMakeLists.txt
      - defines.hpp
      - .forgejo/workflows/linux-check.yaml  # Run check on self change
      - libs/**
      - '!**/*_tests/**'
      - '!libs/platform/*apple*'
      - '!libs/platform/*_ios*'
      - '!libs/platform/*_linux*'
      - '!libs/platform/*_mac*'
      - '!libs/platform/*_win*'
      - '!libs/pyhelpers/**'
      - private.h
      - qt/**
      - generator/**
      - tools/unix/build_omim.sh
      - tools/unix/run_tests.sh
    branches:
      - main
  pull_request:
    paths: *paths

env:
  SUBMODULE_CACHE_PATHS: |
    .git/modules
    3party/CMake-MetalShaderSupport
    3party/Vulkan-Headers
    3party/boost
    3party/expat
    3party/fast_double_parser
    3party/fast_obj
    3party/freetype/freetype
    3party/gflags
    3party/glaze
    3party/glfw
    3party/glm
    3party/googletest
    3party/harfbuzz/harfbuzz
    3party/icu/icu
    3party/imgui/imgui
    3party/jansson/jansson
    3party/just_gtfs
    3party/protobuf/protobuf
    3party/pugixml/pugixml
    3party/utfcpp
    tools/kothic
    tools/osmctools

jobs:
  linux-no-unity:
    name: Linux no unity build
    runs-on: comaps-android
    # Cancels previous jobs if the same branch or PR was updated again.
    concurrency:
      group: ${{ github.workflow }}-no-unity-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    # This currently fails on main.
    # Allow failures so that the fail/pass results from CI can be helpful
    # in the assesment of code changes with the workflows that work on main.
    # Let's remove this line after the errors are resolved.
    continue-on-error: true

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 100 # enough to get all commits for the current day

      - name: Cache world map
        uses: actions/cache@v4
        with:
          path: data/world_mwm
          key: world-mwm

      - uses: actions/cache@v4
        with:
          path: ${{ env.SUBMODULE_CACHE_PATHS }}
          key: submodules-${{ hashFiles('.gitmodules') }}
          restore-keys: |
            submodules-

      - name: Sync and update submodules
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --depth 1 --init --recursive --jobs=$(($(nproc) * 20))

      - name: Configure ccache
        uses: https://github.com/hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.workflow }}-no-unity

      - name: Compile
        shell: bash
        env:
          CC: clang
          CXX: clang++
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
          SKIP_MAP_DOWNLOAD: 1
          # -g1 should slightly reduce build time.
          CMAKE_C_FLAGS: -g1
          CMAKE_CXX_FLAGS: -g1
          CMAKE_CONFIG: -DCMAKE_UNITY_BUILD=OFF
        run: ./tools/unix/build_omim.sh -d

  linux-matrix:
    name: Linux builds and tests
    runs-on: comaps-android
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: {CXX: g++, CC: gcc}
            CMAKE_BUILD_TYPE: RelWithDebInfo
            allow_failure: false
          # The following builds currently fail on main.
          # Allow failures so that the fail/pass results from CI can be helpful
          # in the assesment of code changes.
          # Let's bring them back to the matrix without failures allowed
          # after the errors are resolved.
          - compiler: {CXX: clang, CC: clang}
            CMAKE_BUILD_TYPE: Debug
            allow_failure: true
          - compiler: {CXX: clang, CC: clang}
            CMAKE_BUILD_TYPE: RelWithDebInfo
            allow_failure: true
          - compiler: {CXX: g++, CC: gcc}
            CMAKE_BUILD_TYPE: Debug
            allow_failure: true
    # Cancels previous jobs if the same branch or PR was updated again.
    concurrency:
      group: ${{ github.workflow }}-unity-${{ matrix.compiler.CC }}-${{ matrix.CMAKE_BUILD_TYPE }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    continue-on-error: ${{ matrix.allow_failure }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 100 # enough to get all commits for the current day

      - name: Cache world map
        uses: actions/cache@v4
        with:
          path: data/world_mwm
          key: world-mwm

      - uses: actions/cache@v4
        with:
          path: ${{ env.SUBMODULE_CACHE_PATHS }}
          key: submodules-${{ hashFiles('.gitmodules') }}
          restore-keys: |
            submodules-

      - name: Sync and update submodules
        shell: bash
        run: |
          git submodule sync --recursive
          git submodule update --depth 1 --init --recursive --jobs=$(($(nproc) * 20))

      - name: Configure ccache
        uses: https://github.com/hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.workflow }}-unity-${{ matrix.compiler.CC }}-${{ matrix.CMAKE_BUILD_TYPE }}

      - name: Compile
        shell: bash
        env:
          CC: ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
          # -g1 should slightly reduce build time.
          CMAKE_C_FLAGS: -g1
          CMAKE_CXX_FLAGS: -g1
        run: ./tools/unix/build_omim.sh -d

      - name: Tests
        shell: bash
        env:
          QT_QPA_PLATFORM: "offscreen"
          # generator_integration_tests - https://github.com/organicmaps/organicmaps/issues/225
          # opening_hours_integration_tests - https://github.com/organicmaps/organicmaps/issues/219
          # opening_hours_supported_features_tests - https://github.com/organicmaps/organicmaps/issues/219
          # routing_integration_tests - https://github.com/organicmaps/organicmaps/issues/221
          # shaders_tests - https://github.com/organicmaps/organicmaps/issues/223
          # world_feed_integration_tests - https://github.com/organicmaps/organicmaps/issues/215
          CTEST_EXCLUDE_REGEX: "generator_integration_tests|opening_hours_integration_tests|opening_hours_supported_features_tests|routing_benchmarks|routing_integration_tests|routing_quality_tests|search_quality_tests|storage_integration_tests|shaders_tests|world_feed_integration_tests|map_tests|search_tests|running_tests|routing_tests|routing_common_tests|routing_consistency|drape_frontend_tests|generator_tests|base_tests|kml_tests|opening_hours_tests|search_integration_tests|editor_tests|indexer_tests|style_tests|platform_tests|osm_auth_tests|storage_tests"
        run: |
          locale-gen en_US
          locale-gen en_US.UTF-8
          locale-gen es_ES
          locale-gen es_ES.UTF-8
          locale-gen fr_FR
          locale-gen fr_FR.UTF-8
          locale-gen ru_RU
          locale-gen ru_RU.UTF-8
          update-locale
          ./tools/unix/run_tests.sh -b ../omim-build-debug -e "$CTEST_EXCLUDE_REGEX" -s full
